<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${edit} ? '编辑规则' : '新增规则'">规则表单</title>
    <style>
        body {
            font-family: Arial, "Microsoft YaHei", sans-serif;
            margin: 30px;
            background: #f7f8fa;
        }

        .card {
            background: white;
            padding: 24px;
            border-radius: 10px;
            max-width: 800px;
        }

        .form-item {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 9px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        textarea {
            height: 90px;
        }

        button, a.btn {
            padding: 9px 16px;
            border: none;
            border-radius: 6px;
            background: #1677ff;
            color: white;
            text-decoration: none;
            cursor: pointer;
        }

        a.back {
            background: #8c8c8c;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .tip {
            color: #666;
            font-size: 13px;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<h1 th:text="${edit} ? '编辑规则' : '新增规则'"></h1>

<div class="card">
    <form method="post"
          th:action="${edit} ? '/rules/update' : '/rules'"
          th:object="${rule}">

        <input type="hidden" name="oldSourceTable" th:if="${edit}" th:value="${oldSourceTable}">
        <input type="hidden" name="oldOperateType" th:if="${edit}" th:value="${oldOperateType}">

        <div class="form-item">
            <label>来源表 source_table</label>
            <input type="text" th:field="*{sourceTable}" required placeholder="例如：base_trademark">
            <div class="tip">MySQL 业务库中的原始表名。</div>
        </div>

        <div class="form-item">
            <label>操作类型 operate_type</label>
            <select th:field="*{operateType}" required>
                <option value="insert">insert</option>
                <option value="update">update</option>
                <option value="delete">delete</option>
            </select>
            <div class="tip">Maxwell 采集到的操作类型。</div>
        </div>

        <div class="form-item">
            <label>输出类型 sink_type</label>
            <select th:field="*{sinkType}" required>
                <option value="hbase">hbase：维度数据</option>
                <option value="kafka">kafka：事实数据</option>
            </select>
            <div class="tip">维度数据一般去 HBase，事实数据一般去 Kafka。</div>
        </div>

        <div class="form-item">
            <label>输出表/主题 sink_table</label>
            <input type="text" th:field="*{sinkTable}" required placeholder="例如：DIM_BASE_TRADEMARK 或 dwd_favor_info">
            <div class="tip">如果 sink_type 是 hbase，这里就是 HBase/Phoenix 表名；如果是 kafka，这里就是 Kafka 主题名。</div>
        </div>

        <div class="form-item">
            <label>输出字段 sink_columns</label>
            <textarea th:field="*{sinkColumns}" required placeholder="例如：id,tm_name"></textarea>
            <div class="tip">只保留这些字段，多个字段用英文逗号分隔。</div>
        </div>

        <div class="form-item">
            <label>主键字段 sink_pk</label>
            <input type="text" th:field="*{sinkPk}" placeholder="默认 id">
            <div class="tip">一般填 id。维度表建 Phoenix 表时会用到。</div>
        </div>

        <div class="form-item">
            <label>建表扩展 sink_extend</label>
            <input type="text" th:field="*{sinkExtend}" placeholder="可以为空">
            <div class="tip">例如 Phoenix 建表扩展参数。初学阶段可以不填。</div>
        </div>

        <div class="actions">
            <button type="submit">保存</button>
            <a class="btn back" th:href="@{/rules}">返回</a>
        </div>
    </form>
</div>

</body>
</html>
